<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, user-scalable=no">
  <meta name="theme-color" content="#e94560">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="pushIT">
  <meta name="description" content="Self-hosted push notifications for your team">

  <!-- PWA Manifest -->
  <link rel="manifest" href="/manifest.json">

  <!-- iOS Icons -->
  <link rel="apple-touch-icon" href="/icons/icon-180.png">
  <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152.png">
  <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180.png">

  <!-- Styles — cache-bust with version -->
  <link rel="stylesheet" href="/css/style.css?v=1.11.0">

  <title>pushIT</title>
</head>
<body>
  <div id="app">

    <!-- ═══ Loading / Error Screen ═══ -->
    <div id="login-screen">
      <div class="logo">push<span style="color:#fff">IT</span></div>
      <p class="tagline">Self-hosted notifications for your team</p>
      <div class="loading"><div class="spinner"></div></div>
      <p id="auth-status" style="color: var(--text-muted); font-size: 13px; margin-top: 16px;">Loading...</p>
      <button id="login-btn" class="btn btn-primary" style="display:none;">Reload</button>
      <button id="clear-cache-btn" class="btn btn-small" style="display:none; margin-top: 12px; background: var(--bg-tertiary); color: var(--text-secondary);">Clear Cache &amp; Reload</button>
    </div>

    <!-- ═══ Main App ═══ -->
    <div id="app-main" style="display:none; flex-direction:column; height:100%;">

      <!-- Header -->
      <header>
        <span class="logo">push<span style="color:#fff">IT</span></span>
        <div class="user-info">
          <span id="user-name" class="user-name"></span>
        </div>
      </header>

      <!-- Install Prompt (hidden by default) -->
      <div id="install-prompt" style="display:none;">
        <p><strong>Install pushIT</strong> for the best experience and push notifications</p>
        <button id="enable-push-btn" class="btn btn-primary btn-small">Enable Notifications</button>
        <div class="steps">
          On iOS: tap the Share button → "Add to Home Screen"
        </div>
      </div>

      <!-- Main Content Area -->
      <main>
        <!-- Messages View -->
        <div id="view-messages" class="view active">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
            <h2 style="font-size:20px;">Messages</h2>
            <div style="display:flex; gap:8px; align-items:center;">
              <select id="app-filter" title="Filter by app" style="display:none;"></select>
              <button id="clear-all-messages-btn" class="btn-icon" title="Delete all messages" data-action="delete-all-messages">🗑</button>
              <button id="refresh-messages-btn" class="btn-icon" title="Refresh">&#x21bb;</button>
            </div>
          </div>
          <div id="message-list" class="message-list">
            <div class="loading"><div class="spinner"></div></div>
          </div>
        </div>

        <!-- Apps View -->
        <div id="view-apps" class="view">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h2 style="font-size:20px;">Applications</h2>
            <button id="create-app-btn" class="btn btn-primary btn-small">+ New App</button>
          </div>
          <div id="apps-list"></div>
        </div>

        <!-- Filters View -->
        <div id="view-filters" class="view">
          <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
            <h2 style="font-size:20px;">Filters</h2>
            <button id="create-filter-btn" class="btn btn-primary btn-small">+ New Filter</button>
          </div>
          <div id="filters-list"></div>
        </div>

        <!-- Settings View -->
        <div id="view-settings" class="view">
          <h2 style="font-size:20px; margin-bottom:16px;">Settings</h2>
          <div id="settings-content"></div>
        </div>
      </main>

      <!-- Bottom Navigation -->
      <nav>
        <button data-view="messages" class="active">
          <span class="icon">&#x1F4E8;</span>
          <span>Messages</span>
          <span id="messages-badge" class="badge" style="display:none;">0</span>
        </button>
        <button data-view="apps">
          <span class="icon">&#x1F527;</span>
          <span>Apps</span>
        </button>
        <button data-view="filters">
          <span class="icon">&#x1F50D;</span>
          <span>Filters</span>
        </button>
        <button data-view="settings">
          <span class="icon">&#x2699;</span>
          <span>Settings</span>
        </button>
      </nav>
    </div>

  </div>

  <!-- Toast container -->
  <div id="toast-container"></div>

  <!-- App Scripts — cache-bust with version -->
  <script src="/js/auth.js?v=1.11.0"></script>
  <script src="/js/push.js?v=1.11.0"></script>
  <script src="/js/ui.js?v=1.11.0"></script>
  <script src="/js/app.js?v=1.11.0"></script>
</body>
</html>
