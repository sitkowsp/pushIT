# ═══════════════════════════════════════════════════════════════════
# Apache2 Reverse Proxy — pushIT
# ═══════════════════════════════════════════════════════════════════
#
# REQUIRED MODULES:
#   sudo a2enmod proxy proxy_http proxy_wstunnel rewrite ssl headers
#
# INSTALL:
#   sudo cp apache2-pushit.conf /etc/apache2/sites-available/pushit.conf
#   sudo nano /etc/apache2/sites-available/pushit.conf
#   # → Replace YOUR_DOMAIN with your actual domain (e.g., push.example.com)
#   # → Replace BACKEND_IP with your Node.js server IP
#   # → Update SSL cert paths
#   sudo a2ensite pushit
#   sudo systemctl reload apache2
#
# SSL: Uses your SSL certificate. If you use a wildcard cert shared across
#      multiple vhosts, the Protocols http/1.1 directive below prevents
#      HTTP/2 connection coalescing (which causes 421 errors on iOS PWAs).
# ═══════════════════════════════════════════════════════════════════

# ─── HTTP → HTTPS redirect ────────────────────────────────────────
<VirtualHost *:80>
    ServerName YOUR_DOMAIN
    ServerAdmin admin@YOUR_DOMAIN

    RewriteEngine On
    RewriteCond %{HTTPS} off
    RewriteRule ^(.*)$ https://%{HTTP_HOST}%{REQUEST_URI} [L,R=301]
</VirtualHost>

# ─── HTTPS VirtualHost ────────────────────────────────────────────
<VirtualHost *:443>
    ServerName YOUR_DOMAIN
    ServerAdmin admin@YOUR_DOMAIN

    # ── Force HTTP/1.1 to prevent HTTP/2 connection coalescing ──
    # If you use a wildcard cert shared across multiple vhosts on the same IP,
    # HTTP/2 browsers may reuse TLS connections across domains. This causes
    # SNI mismatch → HTTP 421 "Misdirected Request" when iOS PWA opens
    # external links. Safari/SFSafariViewController does NOT retry on 421.
    # Forcing HTTP/1.1 prevents coalescing entirely.
    # Remove this line if you use a dedicated cert for this domain only.
    Protocols http/1.1

    # ── SSL certificate ──
    # Update these paths to match your certificate location.
    SSLEngine On
    SSLCertificateFile      /etc/ssl/certs/YOUR_DOMAIN.crt
    SSLCertificateKeyFile   /etc/ssl/private/YOUR_DOMAIN.key
    SSLCertificateChainFile /etc/ssl/certs/YOUR_DOMAIN-chain.crt

    # If your cert+chain are in a single fullchain file, use:
    # SSLCertificateFile    /etc/ssl/certs/YOUR_DOMAIN-fullchain.crt
    # SSLCertificateKeyFile /etc/ssl/private/YOUR_DOMAIN.key
    # (and remove the ChainFile line)

    SSLProtocol             -all +TLSv1.2 +TLSv1.3
    SSLCipherSuite          ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384
    SSLHonorCipherOrder     On

    # ── Logging ──
    ErrorLog  /var/log/apache2/pushit.error.log
    CustomLog /var/log/apache2/pushit.access.log combined

    # ── Proxy base settings ──
    ProxyPreserveHost On
    ProxyRequests     Off

    # Timeouts: 10s connect, 300s response (for long-polling / SSE)
    ProxyTimeout 300
    ProxyBadHeader Ignore

    # ── WebSocket: /ws → ws://BACKEND_IP:3000/ws ──
    # Must come BEFORE the general ProxyPass so it matches first
    RewriteEngine On
    RewriteCond %{HTTP:Upgrade}   =websocket [NC]
    RewriteCond %{HTTP:Connection} upgrade    [NC]
    RewriteRule ^/ws(.*)$         ws://BACKEND_IP:3000/ws$1 [P,L]

    # ── All other traffic → http://BACKEND_IP:3000 ──
    ProxyPass        / http://BACKEND_IP:3000/ connectiontimeout=10 timeout=300
    ProxyPassReverse / http://BACKEND_IP:3000/

    # ── Request size limit (6 MB for push attachments) ──
    LimitRequestBody 6291456

    # ── Security headers ──
    Header always set X-Frame-Options        "SAMEORIGIN"
    Header always set X-Content-Type-Options  "nosniff"
    Header always set X-XSS-Protection        "1; mode=block"
    Header always set Referrer-Policy          "strict-origin-when-cross-origin"
    Header always set Strict-Transport-Security "max-age=63072000; includeSubDomains; preload"
    Header always set Permissions-Policy       "camera=(), microphone=(), geolocation=()"

    # CSP — adjust connect-src to match your domain
    Header always set Content-Security-Policy "\
        default-src 'self'; \
        script-src  'self'; \
        style-src   'self' 'unsafe-inline'; \
        img-src     'self' data: https:; \
        font-src    'self'; \
        connect-src 'self' wss://YOUR_DOMAIN; \
        base-uri    'self'; \
        form-action 'self'"

    # Strip server info
    Header always unset X-Powered-By
    Header always unset Server

    # Forward proto/host for the backend
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Host  "YOUR_DOMAIN"
</VirtualHost>
